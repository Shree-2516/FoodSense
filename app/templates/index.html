<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Recommender</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">
    <h1>Restaurant Recommendation System</h1>
    <p>Discover restaurant suggestions based on your favorite place and preferences.</p>

    <form action="/recommend" method="POST">
        <input list="restaurants" name="restaurant" placeholder="Search restaurant...">

        <datalist id="restaurants">
            {% for name in data %}
                <option value="{{ name }}">
            {% endfor %}
        </datalist>

        <input type="text" name="food" placeholder="Search by food (e.g. Biryani, Pizza)">

        <label>Area / City:</label>
        <select name="location">
            <option value="any">Any</option>
            {% for loc in locations %}
                <option value="{{ loc }}">{{ loc }}</option>
            {% endfor %}
        </select>

        <label>Max Budget (INR):</label>
        <select name="budget">
            <option value="any">Any</option>
            <option value="500">500</option>
            <option value="1000">1000</option>
            <option value="2000">2000</option>
        </select>

        <label>Minimum Rating:</label>
        <select name="rating">
            <option value="any">Any</option>
            <option value="3">3+</option>
            <option value="4">4+</option>
        </select>

        <label>Cuisine:</label>
        <input type="text" name="cuisine" placeholder="e.g. North Indian">

        <label>Smart Filters:</label>
        <div style="display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap;">
            <label style="font-weight: normal; margin-bottom: 0; display: flex; align-items: center; gap: 5px;"><input type="checkbox" name="is_veg" value="true"> Veg/Veg Options</label>
            <label style="font-weight: normal; margin-bottom: 0; display: flex; align-items: center; gap: 5px;"><input type="checkbox" name="has_outdoor" value="true"> Outdoor Seating</label>
            <label style="font-weight: normal; margin-bottom: 0; display: flex; align-items: center; gap: 5px;"><input type="checkbox" name="online_order" value="true"> Online Order</label>
            <label style="font-weight: normal; margin-bottom: 0; display: flex; align-items: center; gap: 5px;"><input type="checkbox" name="book_table" value="true"> Table Booking</label>
        </div>

        <button type="submit">Recommend</button>
    </form>

    <div class="quick-links">
        <a class="link-button" href="{{ url_for('insights') }}">View Insights</a>
    </div>

    <div class="info-card">
        <h3>Popular Cuisines</h3>
        <div class="tag-list">
            {% for item in popular_cuisines %}
                <span class="tag">{{ item }}</span>
            {% endfor %}
        </div>
    </div>
</div>

</body>
</html>
